function buildChart(data,color,unit){
if(data.length<2) return '';
const W=320,H=120,pad={t:10,r:10,b:24,l:36};
const vals=data.map(d=>d.y), mn=Math.min(...vals), mx=Math.max(...vals);
const range=mx-mn||1;
const xStep=(W-pad.l-pad.r)/(data.length-1);
const pts=data.map((d,i)=>{
const x=pad.l+i*xStep;
const y=pad.t+(1-(d.y-mn)/range)*(H-pad.t-pad.b);
return{x,y,v:d.y,l:d.x};
});
const line=pts.map((p,i)=>(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1)).join(' ');
const area=line+' L'+pts[pts.length-1].x.toFixed(1)+','+(H-pad.b)+' L'+pts[0].x.toFixed(1)+','+(H-pad.b)+' Z';
let svg='<div class="chart-wrap"><svg class="chart-svg" viewBox="0 0 '+W+' '+H+'">';
svg+='<path class="chart-area" d="'+area+'" fill="'+color+'"/>';
svg+='<path class="chart-line" d="'+line+'" stroke="'+color+'"/>';
pts.forEach((p,i)=>{
svg+='<circle class="chart-dot" cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" fill="'+color+'"/>';
if(i===0||i===pts.length-1||i%Math.ceil(data.length/5)===0){
svg+='<text class="chart-label" x="'+p.x.toFixed(1)+'" y="'+(H-4)+'" text-anchor="middle">'+p.l+'</text>';
}
});
svg+='<text class="chart-val" x="2" y="'+(pad.t+4)+'">'+mx+'</text>';
svg+='<text class="chart-val" x="2" y="'+(H-pad.b-2)+'">'+mn+'</text>';
svg+='</svg></div>';
return svg;
}

const tCal=MAC.training.protein*4+MAC.training.carbs*4+MAC.training.fat*9;
h+='<div style="font-size:10px;color:var(--t3);margin-top:6px">Calculated: ~'+tCal+' calories</div></div>';
// Macro targets - Off
h+='<div class="cd"><div class="ct" style="margin-bottom:10px">Off Day Macros</div>';
h+='<div class="ir"><div class="ig"><div class="il">Protein (g)</div><input class="inf" id="sMOP" type="number" value="'+MAC.off.protein+'"></div><div class="ig"><div class="il">Carbs (g)</div><input class="inf" id="sMOC" type="number" value="'+MAC.off.carbs+'"></div></div>';
h+='<div class="ir"><div class="ig"><div class="il">Fat (g)</div><input class="inf" id="sMOF" type="number" value="'+MAC.off.fat+'"></div><div class="ig"><div class="il">Fiber (g)</div><input class="inf" id="sMOFb" type="number" value="'+MAC.off.fiber+'"></div></div>';
const oCal=MAC.off.protein*4+MAC.off.carbs*4+MAC.off.fat*9;
h+='<div style="font-size:10px;color:var(--t3);margin-top:6px">Calculated: ~'+oCal+' calories</div></div>';
// Profile
h+='<div class="cd"><div class="ct" style="margin-bottom:10px">Profile</div>';
h+='<div class="ir3"><div class="ig"><div class="il">Age</div><input class="inf" id="sPAge" type="number" value="'+prof.age+'"></div><div class="ig"><div class="il">Height</div><input class="inf" id="sPH" value="'+prof.height+'"></div><div class="ig"><div class="il">Water Cups</div><input class="inf" id="sPW" type="number" value="'+prof.waterCups+'"></div></div>';
h+='<div class="ig"><div class="il">Steps Goal</div><input class="inf" id="sPSteps" type="number" value="'+prof.stepsGoal+'"></div></div>';
h+='<button class="bp" data-act="saveSettings">Save All Settings</button>';
// Reset macros to defaults
h+='<button class="bs" data-act="resetMacros">Reset Macros to Original</button>';
// Data management
h+='<div class="cd" style="margin-top:12px"><div class="ct" style="margin-bottom:8px">Data</div>';
h+='<button class="bs" data-act="exportData">Export All Data (JSON)</button>';
h+='<button class="bd" data-act="clearData">Clear All Data</button>';
h+='</div>';
return h;
}

// ═══════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════
function openModal(type,data){modal={type,data};renderModal()}
function closeModal(){stopRestTimer();modal=null;renderModal();render()}
function renderModal(){
const el=document.getElementById('modal');
if(!modal){el.className='mo';el.innerHTML='';return}
el.className='mo op';
let h='<div class="ms"><div class="mh"></div>';
if(modal.type==='food'){
h+='<div class="mtl">Log Food</div>';
h+='<div class="ig"><div class="il">Food Name</div><input class="inf" id="mFoodName" placeholder="e.g. Chicken breast"></div>';
h+='<div class="ir"><div class="ig"><div class="il">Protein (g)</div><input class="inf" id="mFoodP" type="number" placeholder="0"></div><div class="ig"><div class="il">Carbs (g)</div><input class="inf" id="mFoodC" type="number" placeholder="0"></div></div>';
h+='<div class="ir"><div class="ig"><div class="il">Fat (g)</div><input class="inf" id="mFoodF" type="number" placeholder="0"></div><div class="ig"><div class="il">Fiber (g)</div><input class="inf" id="mFoodFb" type="number" placeholder="0"></div></div>';
h+='<button class="bp" data-act="saveFood">Add to Log</button>';
} else if(modal.type==='weight'){
h+='<div class="mtl">Log Weight</div>';
h+='<div class="ig"><div class="il">Weight (lbs)</div><input class="inf" id="mWeight" type="number" step="0.1" placeholder="185"></div>';
h+='<div class="ir"><div class="ig"><div class="il">Waist (in)</div><input class="inf" id="mWaist" type="number" step="0.1" placeholder="optional"></div><div class="ig"><div class="il">Arms (in)</div><input class="inf" id="mArms" type="number" step="0.1" placeholder="optional"></div></div>';
h+='<div class="ig"><div class="il">Notes</div><input class="inf" id="mNote" placeholder="How are you feeling?"></div>';
h+='<button class="bp" data-act="saveWeight">Save</button>';
} else if(modal.type==='exWeight'){
h+='<div class="mtl">Log Weight: '+modal.data.name+'</div>';
// Show existing sets for today
const s=getState();
let sets=(s.exerciseWeights&&s.exerciseWeights[modal.data.key])||[];
// Handle old format (object) vs new format (array)
if(sets&&!Array.isArray(sets))sets=[sets];
if(sets.length>0){
h+='<div style="margin-bottom:12px;max-height:120px;overflow-y:auto">';
sets.forEach((set,i)=>{
h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:var(--s2);border-radius:6px;margin-bottom:4px">';
h+='<span style="color:var(--t2);font-size:12px">Set '+(i+1)+': <span style="color:var(--yel)">'+set.w+'lbs × '+set.r+'</span>'+(set.rpe?' <span style="color:var(--t3)">RPE '+set.rpe+'</span>':'')+'</span>';
h+='<button class="del-btn" data-act="delSet" data-i="'+i+'" style="width:20px;height:20px;font-size:14px">&times;</button></div>';
});
h+='</div>';
}
// Rest timer display
if(restInterval){
const mins=Math.floor(restSeconds/60);
const secs=restSeconds%60;
h+='<div id="restTimer" style="text-align:center;padding:16px;background:var(--s2);border-radius:8px;margin-bottom:12px">';
h+='<div style="font-size:11px;color:var(--t3);margin-bottom:4px">REST TIME</div>';
h+='<div style="font-size:36px;font-weight:700;color:'+(restSeconds<=10?'var(--pri)':'var(--yel)')+'">'+mins+':'+(secs<10?'0':'')+secs+'</div>';
h+='<div style="display:flex;gap:8px;justify-content:center;margin-top:8px">';
h+='<button class="bs" data-act="addRest" data-sec="30" style="padding:6px 12px;font-size:11px">+30s</button>';
h+='<button class="bs" data-act="skipRest" style="padding:6px 12px;font-size:11px">Skip</button>';
h+='</div></div>';
}
const lastSet=sets.length>0?sets[sets.length-1]:null;
h+='<div style="color:var(--t3);font-size:11px;margin-bottom:6px">Add Set '+(sets.length+1)+':</div>';
h+='<div class="ir"><div class="ig"><div class="il">Weight (lbs)</div><input class="inf" id="mExW" type="number" placeholder="0"'+(lastSet?' value="'+lastSet.w+'"':'')+'></div><div class="ig"><div class="il">Reps</div><input class="inf" id="mExR" type="number" placeholder="0"'+(lastSet?' value="'+lastSet.r+'"':'')+'></div></div>';
h+='<div class="ig"><div class="il">RPE (optional)</div><input class="inf" id="mExRPE" type="number" step="0.5" placeholder="8-10"></div>';
h+='<button class="bp" onclick="saveExWeightEntry()">+ Add Set</button>';
}
h+='<button class="bs" data-act="closeModal">Cancel</button></div>';
el.innerHTML=h;
bindEvents();
}

// ═══════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════
function bindEvents(){
// Nav
document.querySelectorAll('[data-pg]').forEach(b=>b.onclick=()=>{page=b.dataset.pg;render()});
// Actions
document.querySelectorAll('[data-act]').forEach(b=>{
const act=b.dataset.act;
if(act==='toggleDay'){b.onclick=()=>{const s=getState();s.training=!s.training;saveState(s);render()}}
else if(act==='water'){b.onclick=()=>{const s=getState(),i=parseInt(b.dataset.i);s.water=i<s.water?i:i+1;saveState(s);render()}}
else if(act==='selDay'){b.onclick=()=>{curDay=b.dataset.day;render()}}
else if(act==='togEx'){b.onclick=()=>{const s=getState(),k=b.dataset.key;s.exercises[k]=!s.exercises[k];saveState(s);saveWorkoutSnap();render()}}
else if(act==='logWeight'){b.onclick=()=>openModal('exWeight',{key:b.dataset.key,name:b.dataset.name})}
else if(act==='togRPE'){b.onclick=()=>{const bd=document.getElementById('rpeBody');bd.style.display=bd.style.display==='none'?'block':'none'}}
else if(act==='delFood'){b.onclick=()=>{const s=getState();s.foods.splice(parseInt(b.dataset.i),1);saveState(s);saveMacroSnap();render()}}
else if(act==='delWeight'){b.onclick=()=>{const wl=getWeightLog();wl.splice(parseInt(b.dataset.i),1);saveWeightLog(wl);render()}}
else if(act==='pTab'){b.onclick=()=>{progressTab=b.dataset.t;render()}}
else if(act==='exportData'){b.onclick=exportData}
else if(act==='clearData'){b.onclick=()=>{if(confirm('Delete ALL progress data?')){localStorage.clear();render()}}}
else if(act==='saveSettings'){b.onclick=saveSettings}
else if(act==='resetMacros'){b.onclick=()=>{if(confirm('Reset macros to original Pro Physique values?')){saveMacros(JSON.parse(JSON.stringify(MACROS_DEFAULT)));render()}}}
else if(act==='saveFood'){b.onclick=saveFood}
else if(act==='saveWeight'){b.onclick=saveWeightEntry}
else if(act==='saveExWeight'){b.onclick=saveExWeightEntry}
else if(act==='delSet'){b.onclick=()=>{const s=getState();if(s.exerciseWeights&&s.exerciseWeights[modal.data.key]){if(!Array.isArray(s.exerciseWeights[modal.data.key]))s.exerciseWeights[modal.data.key]=[s.exerciseWeights[modal.data.key]];s.exerciseWeights[modal.data.key].splice(parseInt(b.dataset.i),1);if(s.exerciseWeights[modal.data.key].length===0)delete s.exerciseWeights[modal.data.key];saveState(s);renderModal()}}}
else if(act==='addRest'){b.onclick=()=>{restSeconds+=parseInt(b.dataset.sec);renderModal()}}
else if(act==='skipRest'){b.onclick=()=>{stopRestTimer();renderModal()}}
else if(act==='logCardio'){b.onclick=()=>{const s=getState();if(!s.cardioToday){s.cardioToday=true;s.cardioThisWeek=(s.cardioThisWeek||0)+1;saveState(s);render()}}}
else if(act==='logSteps'){b.onclick=()=>{const steps=prompt('Enter steps:');if(steps){const s=getState();s.steps=parseInt(steps)||0;saveState(s);render()}}}
else if(act==='closeModal'){b.onclick=closeModal}
});
// Modal overlay close
document.getElementById('modal').onclick=e=>{if(e.target.classList.contains('mo'))closeModal()};
}

function saveFood(){
const name=document.getElementById('mFoodName').value.trim();
if(!name)return;
const p=parseInt(document.getElementById('mFoodP').value)||0;
const c=parseInt(document.getElementById('mFoodC').value)||0;
const f=parseInt(document.getElementById('mFoodF').value)||0;
const fb=parseInt(document.getElementById('mFoodFb').value)||0;
const cal=p*4+c*4+f*9;
const icons=['&#x1F357;','&#x1F969;','&#x1F373;','&#x1F957;','&#x1F35A;','&#x1F951;','&#x1F964;','&#x1F34C;'];
const s=getState();
s.foods.push({name,p,c,f,fb,cal,icon:icons[Math.floor(Math.random()*icons.length)]});
saveState(s);
saveMacroSnap();
closeModal();render();
}

function saveWeightEntry(){
const w=parseFloat(document.getElementById('mWeight').value);
if(!w)return;
const waist=parseFloat(document.getElementById('mWaist').value)||null;
const arms=parseFloat(document.getElementById('mArms').value)||null;
const note=document.getElementById('mNote').value.trim();
const wl=getWeightLog();
const existing=wl.findIndex(e=>e.d===today);
const entry={d:today,w,waist,arms,note};
if(existing>=0)wl[existing]=entry; else wl.push(entry);
saveWeightLog(wl);
closeModal();render();
}

function saveExWeightEntry(){
try{
const wEl=document.getElementById('mExW');
const rEl=document.getElementById('mExR');
if(!wEl||!rEl){alert('Input elements not found');return;}
const w=parseInt(wEl.value)||0;
const r=parseInt(rEl.value)||0;
const rpe=parseFloat(document.getElementById('mExRPE').value)||null;
if(!w&&!r)return; // Allow 0 weight (bodyweight) or 0 reps (isoholds)
const s=getState();
if(!s.exerciseWeights)s.exerciseWeights={};
// Migrate old format (object) to new format (array)
if(s.exerciseWeights[modal.data.key] && !Array.isArray(s.exerciseWeights[modal.data.key])){
const old=s.exerciseWeights[modal.data.key];
s.exerciseWeights[modal.data.key]=[old];
}
if(!s.exerciseWeights[modal.data.key])s.exerciseWeights[modal.data.key]=[];
s.exerciseWeights[modal.data.key].push({w,r,rpe});
saveState(s);
// Also save to history
const hist=DB.get('exWeightHist')||[];
hist.push({d:today,name:modal.data.name,w,r,rpe,set:s.exerciseWeights[modal.data.key].length});
DB.set('exWeightHist',hist);
// Start rest timer
startRestTimer();
// Stay in modal to add more sets
renderModal();
}catch(e){console.error(e);}
}

function startRestTimer(){
if(restInterval)clearInterval(restInterval);
restSeconds=DEFAULT_REST;
restInterval=setInterval(()=>{
restSeconds--;
if(restSeconds<=0){
clearInterval(restInterval);
restInterval=null;
// Vibrate if supported
if(navigator.vibrate)navigator.vibrate([200,100,200]);
renderModal();
} else {
const el=document.getElementById('restTimer');
if(el){
const mins=Math.floor(restSeconds/60);
const secs=restSeconds%60;
el.querySelector('div:nth-child(2)').textContent=mins+':'+(secs<10?'0':'')+secs;
el.querySelector('div:nth-child(2)').style.color=restSeconds<=10?'var(--pri)':'var(--yel)';
}
}
},1000);
}

function stopRestTimer(){
if(restInterval){clearInterval(restInterval);restInterval=null;}
restSeconds=0;
}

function saveWorkoutSnap(){
const s=getState(),w=WORKOUTS[curDay];
const allEx=[...w.main.map((_,i)=>curDay+'-m-'+i),...w.core.map((_,i)=>curDay+'-c-'+i)];
const done=allEx.filter(k=>s.exercises[k]).length;
const wCount=s.exerciseWeights?Object.keys(s.exerciseWeights).length:0;
const wh=getWorkoutHistory();
const existing=wh.findIndex(e=>e.d===today&&e.dayId===curDay);
const entry={d:today,dayId:curDay,day:WORKOUTS[curDay].label,done,total:allEx.length,weights:wCount};
if(existing>=0)wh[existing]=entry; else wh.push(entry);
saveWorkoutHistory(wh);
}

function saveMacroSnap(){
const s=getState();
const tot={p:0,c:0,f:0,fb:0,cal:0};
s.foods.forEach(f=>{tot.p+=f.p;tot.c+=f.c;tot.f+=f.f;tot.fb+=f.fb;tot.cal+=f.cal});
const mh=getMacroHistory();
const existing=mh.findIndex(e=>e.d===today);
const entry={d:today,...tot};
if(existing>=0)mh[existing]=entry; else mh.push(entry);
saveMacroHistory(mh);
}

function exportData(){
const data={
weights:getWeightLog(),
workouts:getWorkoutHistory(),
macros:getMacroHistory(),
exerciseWeights:DB.get('exWeightHist')||[],
macroTargets:getMacros(),
profile:getProfile()
};
const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;a.download='pro-physique-data-'+today+'.json';
a.click();URL.revokeObjectURL(url);
}

function saveSettings(){
const mac={
training:{
protein:parseInt(document.getElementById('sMTP').value)||200,
carbs:parseInt(document.getElementById('sMTC').value)||275,
fat:parseInt(document.getElementById('sMTF').value)||60,
fiber:parseInt(document.getElementById('sMTFb').value)||28
},
off:{
protein:parseInt(document.getElementById('sMOP').value)||200,
carbs:parseInt(document.getElementById('sMOC').value)||225,
fat:parseInt(document.getElementById('sMOF').value)||60,
fiber:parseInt(document.getElementById('sMOFb').value)||23
}
};
saveMacros(mac);
const prof={
age:parseInt(document.getElementById('sPAge').value)||50,
height:document.getElementById('sPH').value||"5'7\"",
waterCups:parseInt(document.getElementById('sPW').value)||9,
stepsGoal:parseInt(document.getElementById('sPSteps').value)||10000
};
saveProfile(prof);
render();
// Quick visual confirmation
setTimeout(()=>{const tc=document.getElementById('tc');tc.scrollTop=0},50);
}

render();
</script>
